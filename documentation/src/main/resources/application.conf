play.http.secret.key = "i am very secret and i am at least 32 bytes long"

# The documentation project depends on the cluster-sharding modules in Test scope so code samples compile.
# Those modules contribute play/reference-overrides.conf with pekko.actor.provider = cluster, but the
# docs server and general documentation tests do not need Pekko Remote/Artery.
pekko.actor.provider = local

# To avoid port conflicts when running documentation tests
pekko.remote.artery.canonical.port = 0